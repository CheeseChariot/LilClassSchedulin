{% extends "base.html" %}
{% block title %}Add Classroom — LilClassSchedulin{% endblock %}
{% block content %}
<div class="section-header">
  <h1>Add Classroom</h1>
  <a href="{{ url_for('classrooms') }}" class="btn btn-secondary btn-sm">← Back</a>
</div>
<div class="card" style="max-width:560px">
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post">
    <div class="form-group">
      <label for="name">Name <span style="color:var(--danger)">*</span></label>
      <input type="text" id="name" name="name" placeholder="e.g. Room 101" required>
    </div>
    <div class="form-group">
      <label for="chairs">Chairs available</label>
      <input type="number" id="chairs" name="chairs" min="0" placeholder="e.g. 30">
    </div>
    <div class="form-group">
      <label for="space_sqm">Space (m²)</label>
      <input type="number" id="space_sqm" name="space_sqm" min="0" step="0.1" placeholder="e.g. 50">
    </div>
    <div class="form-group">
      <label for="capabilities">Capabilities</label>
      <input type="text" id="capabilities" name="capabilities"
             placeholder="e.g. Projector, whiteboard, Wi-Fi">
    </div>
    <div class="form-group">
      <label for="location_guide">Location guide</label>
      <input type="text" id="location_guide" name="location_guide"
             placeholder="e.g. Building A, ground floor, third door on the right">
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" name="description" rows="3"
                placeholder="General description of the room and its use cases"></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Create Classroom</button>
  </form>
</div>
{% endblock %}
