{% extends "base.html" %}
{% block title %}Edit Schedule — LilClassSchedulin{% endblock %}
{% block content %}
<div class="section-header">
  <h1>Edit Schedule: {{ cls.name }}</h1>
  <a href="{{ url_for('teacher_profile', teacher_id=teacher.id) }}" class="btn btn-secondary btn-sm">← Back</a>
</div>
<div class="card" style="max-width:560px">
  <form method="post">
    <div class="form-group">
      <label>Status (leave blank for NULL)</label>
      <input type="text" name="status" value="{{ cls.status or '' }}" placeholder="e.g. active">
    </div>
    <div class="form-group">
      <label>Weekly Schedule (leave blank to skip a day)</label>
      <div class="schedule-blocks-legend muted" style="margin-bottom:8px;font-size:.85em;">
        Blocks are loaded from <code>data/scheblocks.json</code>.
      </div>
      {% for day in days %}
      <div class="schedule-day">
        <span class="day-name">{{ day | capitalize }}</span>
        <select name="{{ day }}">
          <option value="">— none —</option>
          {% for block in blocks %}
          <option value="{{ block.time }}"
            {% if cls.schedule and cls.schedule.get(day) == block.time %}selected{% endif %}>
            {{ block.label }} · {{ block.time }}
          </option>
          {% endfor %}
        </select>
      </div>
      {% endfor %}
    </div>
    <button type="submit" class="btn btn-primary">Save</button>
  </form>
</div>
{% endblock %}
