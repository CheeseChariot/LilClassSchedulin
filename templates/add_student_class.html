{% extends "base.html" %}
{% block title %}Add Class to Career — LilClassSchedulin{% endblock %}
{% block content %}
<div class="section-header">
  <h1>Add Class to {{ student.name }}'s Career</h1>
  <a href="{{ url_for('student_profile', student_id=student.id) }}" class="btn btn-secondary btn-sm">← Back</a>
</div>
<div class="card" style="max-width:560px">
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post">
    {% if all_classes %}
    <div class="form-group">
      <label>Select from existing classes</label>
      <select id="class_select" onchange="fillClass(this)">
        <option value="">— pick a class —</option>
        {% for cls in all_classes %}
        <option value="{{ cls.id }}" data-name="{{ cls.name }}">{{ cls.name }} ({{ cls.teacher }})</option>
        {% endfor %}
      </select>
    </div>
    <p class="muted">— or enter manually below —</p>
    {% endif %}
    <div class="form-group">
      <label for="class_id">Class ID</label>
      <input type="text" id="class_id" name="class_id" placeholder="e.g. math101" required>
    </div>
    <div class="form-group">
      <label for="class_name">Class Name</label>
      <input type="text" id="class_name" name="class_name" placeholder="e.g. Math 101" required>
    </div>
    <div class="form-group">
      <label for="status">Initial Status</label>
      <select id="status" name="status">
        {% for s in statuses %}
        <option value="{{ s }}" {% if s == 'Untaken' %}selected{% endif %}>{{ s }}</option>
        {% endfor %}
      </select>
    </div>
    <button type="submit" class="btn btn-primary">Add to Career</button>
  </form>
</div>
<script>
function fillClass(sel) {
  const opt = sel.options[sel.selectedIndex];
  if (!opt.value) return;
  document.getElementById('class_id').value = opt.value;
  document.getElementById('class_name').value = opt.dataset.name;
}
</script>
{% endblock %}
